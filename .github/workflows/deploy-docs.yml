# Deploy documentation to duckling-ui.org when PRs are merged to main.
# Uses mike for multi-version docs; deploys to gh-pages, then rsyncs to duckling-ui.org.
# Required setup:
#   1. Add POSTHOG_API_KEY to repo Secrets (Settings > Secrets and variables > Actions)
#   2. Configure REMOTE_PATH, SSH_HOST, SSH_PORT, SSH_USER, WEBSITE_DEPLOY_KEY, DEPLOY_KEY_PASS
name: Deploy Docs
permissions:
  contents: write  # Required for mike to push to gh-pages

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for mike

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Inject PostHog API key
        run: |
          sed -i "s|__POSTHOG_API_KEY__|${{ secrets.POSTHOG_API_KEY }}|g" docs/overrides/main.html

      - name: Update version in mkdocs.yml
        run: |
          python scripts/get_version.py || echo "Warning: Could not update version, continuing with existing version"

      - name: Fetch gh-pages for mike
        run: |
          git fetch origin gh-pages --depth=1 || true

      - name: Configure Git for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy docs with mike
        run: |
          VERSION=$(python scripts/get_version.py 2>/dev/null || echo "0.0.11")
          mike deploy --push --update-aliases --alias-type redirect "$VERSION" latest
          mike set-default --push latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Copy sitemap.xml to language directories
        run: |
          for ver_dir in */; do
            if [ -f "${ver_dir}sitemap.xml" ]; then
              for lang in es fr de; do
                lang_dir="${ver_dir}${lang}"
                if [ -d "$lang_dir" ]; then
                  cp "${ver_dir}sitemap.xml" "$lang_dir/sitemap.xml"
                fi
              done
              en_dir="${ver_dir}en"
              mkdir -p "$en_dir"
              cp "${ver_dir}sitemap.xml" "$en_dir/sitemap.xml"
            fi
          done

      - name: rsync deployments
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr
          path: .
          remote_path: ${{ secrets.REMOTE_PATH }}
          remote_host: ${{ secrets.SSH_HOST }}
          remote_port: ${{ secrets.SSH_PORT }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.WEBSITE_DEPLOY_KEY }}
          remote_key_pass: ${{ secrets.DEPLOY_KEY_PASS }}
