# Publish Docker images to Docker Hub and GitHub Container Registry when PRs are merged to main.
# Required secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
# GHCR uses GITHUB_TOKEN (automatically provided by Actions)
#
# The build entrypoint is ./scripts/docker-build.sh. Pull requests run the "Docker build script (publish parity)"
# job in .github/workflows/test.yml (syntax + same flag/expansion paths on ubuntu-latest) so changes stay safe for this workflow.
name: Publish Docker Images

on:
  push:
    branches: [main]

jobs:
  publish:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./frontend/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to Docker Hub
        run: |
          ./scripts/docker-build.sh --push --registry ${{ secrets.DOCKERHUB_USERNAME }} --version ${{ steps.version.outputs.version }} --multi-platform --sbom --provenance

      - name: Build and push to GitHub Container Registry
        run: |
          ./scripts/docker-build.sh --push --registry ghcr.io/${{ github.repository_owner }} --version ${{ steps.version.outputs.version }} --multi-platform --skip-docs --sbom --provenance

      - name: Scan Docker Hub backend image
        run: |
          docker run --rm aquasec/trivy:0.56.2 image --severity HIGH,CRITICAL --exit-code 1 --ignore-unfixed ${{ secrets.DOCKERHUB_USERNAME }}/duckling-backend:${{ steps.version.outputs.version }}

      - name: Scan Docker Hub frontend image
        run: |
          docker run --rm aquasec/trivy:0.56.2 image --severity HIGH,CRITICAL --exit-code 1 --ignore-unfixed ${{ secrets.DOCKERHUB_USERNAME }}/duckling-frontend:${{ steps.version.outputs.version }}

      - name: Scan GHCR backend image
        run: |
          docker run --rm aquasec/trivy:0.56.2 image --severity HIGH,CRITICAL --exit-code 1 --ignore-unfixed ghcr.io/${{ github.repository_owner }}/duckling-backend:${{ steps.version.outputs.version }}

      - name: Scan GHCR frontend image
        run: |
          docker run --rm aquasec/trivy:0.56.2 image --severity HIGH,CRITICAL --exit-code 1 --ignore-unfixed ghcr.io/${{ github.repository_owner }}/duckling-frontend:${{ steps.version.outputs.version }}

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0.20.6

      - name: Generate SBOM artifacts
        run: |
          mkdir -p sbom
          syft ${{ secrets.DOCKERHUB_USERNAME }}/duckling-backend:${{ steps.version.outputs.version }} -o spdx-json > sbom/duckling-backend-dockerhub.spdx.json
          syft ${{ secrets.DOCKERHUB_USERNAME }}/duckling-frontend:${{ steps.version.outputs.version }} -o spdx-json > sbom/duckling-frontend-dockerhub.spdx.json
          syft ghcr.io/${{ github.repository_owner }}/duckling-backend:${{ steps.version.outputs.version }} -o spdx-json > sbom/duckling-backend-ghcr.spdx.json
          syft ghcr.io/${{ github.repository_owner }}/duckling-frontend:${{ steps.version.outputs.version }} -o spdx-json > sbom/duckling-frontend-ghcr.spdx.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: image-sboms-${{ steps.version.outputs.version }}
          path: sbom/*.spdx.json

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.6.0

      - name: Sign Docker Hub and GHCR images (keyless)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes ${{ secrets.DOCKERHUB_USERNAME }}/duckling-backend:${{ steps.version.outputs.version }}
          cosign sign --yes ${{ secrets.DOCKERHUB_USERNAME }}/duckling-frontend:${{ steps.version.outputs.version }}
          cosign sign --yes ghcr.io/${{ github.repository_owner }}/duckling-backend:${{ steps.version.outputs.version }}
          cosign sign --yes ghcr.io/${{ github.repository_owner }}/duckling-frontend:${{ steps.version.outputs.version }}
