# Manually deploy docs for a specific version (backfill older versions).
# Run from Actions > Deploy Docs Version > Run workflow.
# Use version without 'v' prefix (e.g. 0.0.9, 0.0.8).
# Older tags may fail if mkdocs structure changed significantly.
name: Deploy Docs Version
permissions:
  contents: read
  contents: write

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to deploy (e.g. 0.0.9)"
        required: true
        type: string

jobs:
  build:
    name: Build and deploy version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: v${{ github.event.inputs.version }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: requirements-docs.txt

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-docs.txt
          pip install mike  # Ensure mike is present (older tags may not have it)

      - name: Inject PostHog API key
        run: |
          if grep -q "__POSTHOG_API_KEY__" docs/overrides/main.html 2>/dev/null; then
            sed -i "s|__POSTHOG_API_KEY__|${{ secrets.POSTHOG_API_KEY }}|g" docs/overrides/main.html
          fi

      - name: Fetch gh-pages for mike
        run: |
          git fetch origin gh-pages --depth=1 || true

      - name: Configure Git for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy version with mike
        run: |
          VERSION="${{ github.event.inputs.version }}"
          mike deploy --push --alias-type redirect "$VERSION"
          mike set-default --push latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Copy sitemap.xml to language directories
        run: |
          for ver_dir in */; do
            if [ -f "${ver_dir}sitemap.xml" ]; then
              for lang in es fr de; do
                lang_dir="${ver_dir}${lang}"
                if [ -d "$lang_dir" ]; then
                  cp "${ver_dir}sitemap.xml" "$lang_dir/sitemap.xml"
                fi
              done
              en_dir="${ver_dir}en"
              mkdir -p "$en_dir"
              cp "${ver_dir}sitemap.xml" "$en_dir/sitemap.xml"
            fi
          done

      - name: rsync deployments
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr
          path: .
          remote_path: ${{ secrets.REMOTE_PATH }}
          remote_host: ${{ secrets.SSH_HOST }}
          remote_port: ${{ secrets.SSH_PORT }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.WEBSITE_DEPLOY_KEY }}
          remote_key_pass: ${{ secrets.DEPLOY_KEY_PASS }}
