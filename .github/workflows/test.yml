name: Tests

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake

      - name: Install Python dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build docs for tests
        run: |
          mkdocs build

      - name: Run backend tests
        working-directory: backend
        run: |
          python -m pytest tests/ -v --tb=short

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test -- --run

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint -- --max-warnings 20

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

  docker-build-script:
    name: Docker build script (publish parity)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install pytest
        run: python -m pip install --upgrade pip && pip install pytest

      - name: Run docker hardening / build-script regression tests
        run: pytest tests/test_docker_hardening.py -v --tb=short

      - name: Validate docker-build.sh syntax and flag expansions (ubuntu bash)
        run: |
          set -euo pipefail
          bash -n scripts/docker-build.sh
          # Empty BUILDX_FLAGS (local default) + --load: must work under set -u (macOS bash 3.2 parity)
          bash -c 'set -euo pipefail
          BUILDX_FLAGS=()
          BUILDX_OUTPUT_FLAGS=(--load)
          args=("${BUILDX_FLAGS[@]+"${BUILDX_FLAGS[@]}"}" "${BUILDX_OUTPUT_FLAGS[@]+"${BUILDX_OUTPUT_FLAGS[@]}"}")
          [ "${#args[@]}" -eq 1 ] && [ "${args[0]}" = --load ]
          '
          # Matches publish-docker.yml: --multi-platform --sbom --provenance --push
          bash -c 'set -euo pipefail
          ENABLE_SBOM=true
          ENABLE_PROVENANCE=true
          PUSH=true
          BUILDX_FLAGS=()
          if [ "$ENABLE_SBOM" = true ]; then BUILDX_FLAGS+=(--sbom=true); fi
          if [ "$ENABLE_PROVENANCE" = true ]; then BUILDX_FLAGS+=(--provenance=true); fi
          BUILDX_OUTPUT_FLAGS=()
          if [ "$PUSH" = true ]; then BUILDX_OUTPUT_FLAGS+=(--push); fi
          args=("${BUILDX_FLAGS[@]+"${BUILDX_FLAGS[@]}"}" "${BUILDX_OUTPUT_FLAGS[@]+"${BUILDX_OUTPUT_FLAGS[@]}"}")
          [ "${#args[@]}" -eq 3 ] || exit 1
          [ "${args[0]}" = --sbom=true ] && [ "${args[1]}" = --provenance=true ] && [ "${args[2]}" = --push ]
          '

  docker-publish-rehearsal:
    name: Docker publish rehearsal (PR gate)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./frontend/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend and frontend images locally (publish parity flags)
        run: |
          ./scripts/docker-build.sh \
            --version ${{ steps.version.outputs.version }} \
            --multi-platform \
            --platform linux/amd64 \
            --skip-docs \
            --sbom \
            --provenance

      - name: Scan local backend image (Trivy gate)
        run: |
          docker run --rm aquasec/trivy:0.56.2 image --severity HIGH,CRITICAL --exit-code 1 --ignore-unfixed duckling-backend:${{ steps.version.outputs.version }}

      - name: Scan local frontend image (Trivy gate)
        run: |
          docker run --rm aquasec/trivy:0.56.2 image --severity HIGH,CRITICAL --exit-code 1 --ignore-unfixed duckling-frontend:${{ steps.version.outputs.version }}

  docs-build:
    name: Docs Build (MkDocs)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Update version in mkdocs.yml
        run: |
          python scripts/get_version.py || echo "Warning: Could not update version, continuing with existing version"

      - name: Build docs (strict)
        run: |
          mkdocs build --strict

      - name: Copy sitemap.xml to language directories
        run: |
          if [ -f "site/sitemap.xml" ]; then
            # Copy to non-default language directories (es, fr, de)
            for lang in es fr de; do
              lang_dir="site/$lang"
              if [ -d "$lang_dir" ]; then
                cp site/sitemap.xml "$lang_dir/sitemap.xml"
                echo "Copied sitemap.xml to $lang_dir"
              fi
            done
            # For English, ensure sitemap.xml is accessible at /en/sitemap.xml
            # Create site/en/ directory if it doesn't exist (for compatibility)
            if [ ! -d "site/en" ]; then
              mkdir -p site/en
              echo "Created site/en directory for compatibility"
            fi
            cp site/sitemap.xml site/en/sitemap.xml
            echo "Copied sitemap.xml to site/en (for /en/sitemap.xml requests)"
          fi
