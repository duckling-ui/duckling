# Duckling Documentation
# MkDocs configuration file
# https://www.mkdocs.org/

site_name: Duckling UI
site_description: A modern, user-friendly graphical interface for Docling - the powerful document conversion library by IBM
site_author: Duckling Contributors
site_url: https://duckling-ui.org/

# Repository
repo_name: duckling-ui/duckling
repo_url: https://github.com/duckling-ui/duckling
edit_uri: edit/main/docs/

# Copyright
copyright: Copyright &copy; 2026 Duckling Contributors

# Validation - exclude snippet files from nav warnings
validation:
  nav:
    not_found: warn
    omitted_files: ignore

# Theme Configuration
theme:
  name: material
  custom_dir: docs/overrides
  language: en
  palette:
    # Dark mode (default)
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    # Light mode
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    alternate: fontawesome/solid/flag
  logo: assets/duckling.png
  favicon: assets/duckling.png
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.tracking
    - navigation.path
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - toc.integrate
    - search.suggest
    - search.highlight
    - search.share
    - content.tabs.link
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.action.view

# Plugins
plugins:
  - mike:
      alias_type: redirect
  - search:
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
  - minify:
      minify_html: true
      htmlmin_opts:
        remove_comments: true
  - i18n:
