# Extensions
markdown_extensions:
  # Python Markdown
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: false
      permalink_title: Anchor link to this section
      toc_depth: 3

  # PyMdown Extensions
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      normalize_issue_symbols: true
      repo_url_shorthand: true
      user: davidgs
      repo: duckling
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      auto_append:
        - includes/abbreviations.md
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# Navigation
nav:
  - Home: index.md
  - Getting Started:
      - getting-started/index.md
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
      - Docker: getting-started/docker.md
  - User Guide:
      - user-guide/index.md
      - Features: user-guide/features.md
      - Screenshots: user-guide/screenshots.md
      - Supported Formats: user-guide/formats.md
      - Configuration: user-guide/configuration.md
  - Docling docs:
      - docling/index.md
      - Installation: docling/installation.md
      - Quickstart: docling/quickstart.md
      - Supported formats: docling/supported-formats.md
      - Advanced options: docling/advanced-options.md
      - Architecture: docling/architecture.md
      - DoclingDocument: docling/docling-document.md
  - API Reference:
      - api/index.md
      - Conversion: api/conversion.md
      - Settings: api/settings.md
      - History: api/history.md
  - Architecture:
      - architecture/index.md
      - System Overview: architecture/overview.md
      - Components: architecture/components.md
      - Diagrams: architecture/diagrams.md
  - Deployment:
      - deployment/index.md
      - Production: deployment/production.md
      - Scaling: deployment/scaling.md
      - Security: deployment/security.md
  - Contributing:
      - contributing/index.md
      - Development Setup: contributing/development.md
      - Code Style: contributing/code-style.md
      - Testing: contributing/testing.md
      - Accessibility: contributing/accessibility.md
      - Code of Conduct: contributing/code-of-conduct.md
  - Changelog: changelog.md

# Extra
extra:
  version:
    provider: mike
    default: 0.0.12
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/duckling-ui/duckling
      name: Duckling on GitHub
  generator: false
  # analytics omitted — PostHog used in docs/overrides/main.html
  alternate:
    - name: "🇺🇸 English"
      link: https://duckling-ui.org/
      lang: en
    - name: "🇪🇸 Español"
      link: https://duckling-ui.org/es/
      lang: es
    - name: "🇫🇷 Français"
      link: https://duckling-ui.org/fr/
      lang: fr
    - name: "🇩🇪 Deutsch"
      link: https://duckling-ui.org/de/
      lang: de

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - javascripts/language-selector.js
  - javascripts/section-footer-nav.js
  - javascripts/scrollable-focus.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
